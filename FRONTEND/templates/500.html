{% extends "base.html" %}
{% block title %}Server Error{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-12 col-md-6 text-center">
    <h1 class="display-1 fw-bold text-muted">500</h1>
    <h2 class="mb-3">Something Went Wrong</h2>
    <p class="text-muted mb-4">An unexpected error occurred. Please try again later.</p>
    <a href="{{ url_for('auth.login') }}" class="btn btn-primary">Return to Login</a>
  </div>
</div>
{% endblock %}
