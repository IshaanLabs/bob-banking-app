{% extends "base.html" %}
{% block title %}Deposit Funds{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-sm-10 col-md-7 col-lg-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h2 class="card-title mb-4">Deposit Funds</h2>

        <form method="POST" action="{{ url_for('accounts.deposit_view') }}" novalidate>
          <input type="hidden" name="csrf_token" value="{{ csrf_token() if csrf_token is defined else '' }}" />

          <div class="mb-4">
            <label for="amount" class="form-label fw-semibold">Amount to Deposit (£)</label>
            <div class="input-group input-group-lg">
              <span class="input-group-text">£</span>
              <input
                type="number"
                class="form-control"
                id="amount"
                name="amount"
                min="0.01"
                step="0.01"
                placeholder="0.00"
                required
              />
            </div>
            <div class="form-text text-muted">Enter a positive amount. Minimum: £0.01.</div>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success btn-lg flex-fill">Deposit</button>
            <a href="{{ url_for('dashboard.dashboard') }}" class="btn btn-secondary btn-lg">Cancel</a>
          </div>
        </form>

      </div>
    </div>
  </div>
</div>
{% endblock %}
